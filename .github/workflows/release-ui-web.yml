name: Release ui-web to npm

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the current packages/ui-web version to npm
        required: true
        type: boolean
        default: false
  release:
    types:
      - published

jobs:
  publish-ui-web:
    name: Validate and publish ui-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release_metadata
        run: |
          PACKAGE_NAME=$(node --print "require('./packages/ui-web/package.json').name")
          PACKAGE_VERSION=$(node --print "require('./packages/ui-web/package.json').version")
          TOKENS_RANGE=$(node --print "require('./packages/ui-web/package.json').dependencies['@nexu-design/tokens'].replace(/^workspace:/, '')")

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tokens_range=$TOKENS_RANGE" >> "$GITHUB_OUTPUT"

      - name: Run release validation
        run: pnpm release:check

      - name: Ensure ui-web version is unpublished
        run: |
          if npm view "${{ steps.release_metadata.outputs.package_name }}@${{ steps.release_metadata.outputs.package_version }}" version >/dev/null 2>&1; then
            echo "::error::${{ steps.release_metadata.outputs.package_name }}@${{ steps.release_metadata.outputs.package_version }} is already published to npm."
            exit 1
          fi

      - name: Ensure tokens dependency exists on npm
        run: |
          if ! npm view "@nexu-design/tokens@${{ steps.release_metadata.outputs.tokens_range }}" version >/dev/null 2>&1; then
            echo "::error::@nexu-design/ui-web requires @nexu-design/tokens@${{ steps.release_metadata.outputs.tokens_range }} to be published to npm first."
            exit 1
          fi

      - name: Publish ui-web to npm
        if: github.event_name == 'release' || inputs.publish
        working-directory: packages/ui-web
        run: npm publish --access public

      - name: Publish summary
        if: github.event_name != 'release' && !inputs.publish
        run: |
          echo "Validation completed. Re-run with publish=true or publish a GitHub Release to publish ${{ steps.release_metadata.outputs.package_name }}@${{ steps.release_metadata.outputs.package_version }}."
