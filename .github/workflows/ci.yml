name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require changeset for package changes
        # Must stay aligned with .github/workflows/release.yml branch: changeset-release/main
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED_FILES="$(git diff --name-only "$BASE"...HEAD)"
          ADDED_OR_MODIFIED="$(git diff --name-only --diff-filter=AM "$BASE"...HEAD)"
          CHANGESET_FILES="$(printf '%s\n' "$ADDED_OR_MODIFIED" | grep -E '^\.changeset/.+\.md$' | grep -Ev '^\.changeset/README\.md$' || true)"

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^packages/(tokens|ui-web)/'; then
            if [ -z "$CHANGESET_FILES" ]; then
              echo "Changes to packages/tokens or packages/ui-web require a new or updated changeset entry."
              exit 1
            fi
          fi

      - name: Run format check
        run: pnpm format:check

      - name: Run Biome check
        run: pnpm biome:check

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run build
        run: pnpm build
